<canvas id="vibeCanvas"></canvas>

<!-- Glassmorphism Gear Menu Button -->
<button id="settingsBtn" class="gear-btn" title="Open Settings">⚙️</button>

<!-- Upgraded Settings Dashboard -->
<div id="settingsPanel" class="settings-panel hidden">
  <div class="panel-header">
    <h3>SWARM QUANTUM ENGINE</h3>
    <button id="closeBtn" class="close-btn">&times;</button>
  </div>
  
  <div class="panel-body">
    <!-- Ball Number -->
    <div class="control-group">
      <label for="ballNumber">Ball Count: <span id="valCount">400</span></label>
      <input type="range" id="ballNumber" min="10" max="1200" step="10" value="400">
    </div>

    <!-- Particle Radius Size -->
    <div class="control-group">
      <label for="ballSize">Ball Size Radius: <span id="valSize">2.0px</span></label>
      <input type="range" id="ballSize" min="0.5" max="12" step="0.5" value="2">
    </div>

    <!-- Gravity Strength -->
    <div class="control-group">
      <label for="gravStrength">Gravity Strength: <span id="valStrength">1.0</span></label>
      <input type="range" id="gravStrength" min="-2.5" max="3.0" step="0.1" value="1.0">
      <span class="sub-hint">(Negative values push particles away)</span>
    </div>

    <!-- Maximum Vector Speed -->
    <div class="control-group">
      <label for="gravSpeed">Max Speed Velocity: <span id="valSpeed">8</span></label>
      <input type="range" id="gravSpeed" min="2" max="25" step="1" value="8">
    </div>

    <!-- Atmosphere Friction -->
    <div class="control-group">
      <label for="swarmFriction">Atmosphere Friction: <span id="valFriction">Medium</span></label>
      <input type="range" id="swarmFriction" min="0.85" max="0.99" step="0.01" value="0.97">
    </div>

    <!-- Motion Blur Trails -->
    <div class="control-group">
      <label for="trailLength">Motion Blur Trails: <span id="valTrails">Long</span></label>
      <input type="range" id="trailLength" min="0.05" max="0.5" step="0.05" value="0.2">
    </div>

    <!-- Laser Connectors Toggle Switch -->
    <div class="control-group checkbox-group">
      <label class="toggle-container">
        <span>Laser Connectors</span>
        <input type="checkbox" id="toggleLines">
        <span class="checkmark"></span>
      </label>
    </div>

    <!-- Theme Palette Selector -->
    <div class="control-group">
      <label for="themePreset">Spectrum Theme Preset</label>
      <select id="themePreset" class="custom-select">
        <option value="cyber">Cyber Drift (Rainbow Shift)</option>
        <option value="matrix">Matrix (Toxic Green)</option>
        <option value="synth">Synthwave (Neon Fuchsia)</option>
        <option value="deep">Deep Sea (Electric Cyan)</option>
      </select>
    </div>
  </div>
</div>
